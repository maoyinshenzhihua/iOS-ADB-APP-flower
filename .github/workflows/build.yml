name: Build iOS App

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project zmq.xcodeproj \
            -scheme zmq \
            -configuration Debug \
            -archivePath build/zmq.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_TEAM_ID=XXXXXXXXXX

      - name: Upload xcarchive
        uses: actions/upload-artifact@v4
        with:
          name: zmq-xcarchive
          path: build/zmq.xcarchive
