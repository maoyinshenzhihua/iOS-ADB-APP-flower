name: Build iOS App

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild build \
            -project zmq.xcodeproj \
            -scheme zmq \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=16.0

      - name: Create IPA
        run: |
          cd build/Build/Products/Debug-iphoneos
          echo "=== App bundle contents ==="
          ls -la *.app/
          echo "=== Frameworks ==="
          ls -la *.app/Frameworks/ 2>/dev/null || echo "No Frameworks directory"
          echo "=== SwiftSupport ==="
          ls -la *.app/SwiftSupport/ 2>/dev/null || echo "No SwiftSupport directory"
          mkdir -p Payload
          cp -r *.app Payload/
          cd Payload
          zip -r ../zmq.ipa *
          cd ..
          ls -la zmq.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: zmq-unsigned-ipa
          path: build/Build/Products/Debug-iphoneos/zmq.ipa
