name: Build iOS App

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Build
        run: |
          xcodebuild build \
            -project zmq.xcodeproj \
            -scheme zmq \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_NO_CRASH_ON_ERROR=YES

      - name: Create IPA
        run: |
          PRODUCT_PATH=$(xcodebuild -project zmq.xcodeproj -scheme zmq -configuration Debug -destination 'generic/platform=iOS' -showBuildSettings | grep -m1 "BUILT_PRODUCTS_DIR" | awk '{print $3}')
          echo "Product path: $PRODUCT_PATH"
          cd "$PRODUCT_PATH"
          mkdir -p Payload
          cp -r *.app Payload/
          cd Payload
          zip -r ../zmq.ipa *
          cd ..
          ls -la zmq.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: zmq-unsigned-ipa
          path: build/Build/Products/Debug-iphoneos/zmq.ipa
