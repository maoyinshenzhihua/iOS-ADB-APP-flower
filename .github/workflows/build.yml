name: Build iOS App

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Build
        run: |
          xcodebuild build \
            -project zmq.xcodeproj \
            -scheme zmq \
            -configuration Debug \
            -destination 'platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_NO_CRASH_ON_ERROR=YES

      - name: Verify Assets.car
        run: |
          find ./build -name "Assets.car" -type f 2>/dev/null || echo "No Assets.car found"
          ls -la ./build/Build/Products/Debug-iphoneos/zmq.app/ 2>/dev/null || echo "App bundle not found"

      - name: Create IPA
        run: |
          cd build/Build/Products/Debug-iphoneos
          mkdir -p Payload
          cp -r *.app Payload/
          cd Payload
          zip -r ../zmq.ipa *
          cd ..
          ls -la zmq.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: zmq-unsigned-ipa
          path: build/Build/Products/Debug-iphoneos/zmq.ipa
