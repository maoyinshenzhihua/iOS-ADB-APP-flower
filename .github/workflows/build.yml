name: Build iOS App

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app
          xcodebuild -version

      - name: Build
        run: |
          sudo xcodebuild -downloadAllPlatforms 2>/dev/null || true
          xcodebuild build \
            -project zmq.xcodeproj \
            -scheme zmq \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=16.0

      - name: Create IPA
        run: |
          cd build/Build/Products/Debug-iphoneos
          mkdir -p Payload
          cp -r *.app Payload/
          cd Payload
          zip -r ../zmq.ipa *
          cd ..
          ls -la zmq.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: zmq-unsigned-ipa
          path: build/Build/Products/Debug-iphoneos/zmq.ipa
